<!DOCTYPE html>
<html>
<head>
    <title>MPSC Quiz</title>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">MPSC Quiz</span>
    </div>
</nav>

<div class="container mt-5">

    <div class="card p-4 shadow">

        <div class="d-flex justify-content-between">
            <h5 id="qNumber"></h5>
            <h5 id="score"></h5>
        </div>

        <h4 id="question" class="mt-3"></h4>

        <div id="options" class="mt-3"></div>

        <p id="result" class="mt-3 fw-bold"></p>
        <p id="explanation" class="text-muted"></p>

        <div class="mt-3 d-flex justify-content-between">
            <button class="btn btn-secondary" onclick="nextQuestion()">Next</button>
        </div>

    </div>

</div>

<script>
let data = [];
let current = 0;
let score = 0;

fetch('questions.json')
.then(res => res.json())
.then(q => {
    data = q;
    loadQuestion();
});

function loadQuestion() {
    let q = data[current];

    document.getElementById("qNumber").innerText = 
        "Question " + (current + 1) + "/" + data.length;

    document.getElementById("score").innerText = 
        "Score: " + score;

    document.getElementById("question").innerText = q.question;

    let optionsHtml = "";

    q.options.forEach(opt => {
        optionsHtml += `
            <button class="btn btn-outline-primary w-100 mt-2"
                onclick="checkAnswer('${opt}')">
                ${opt}
            </button>`;
    });

    document.getElementById("options").innerHTML = optionsHtml;
}

function checkAnswer(selected) {
    let q = data[current];

    if (selected === q.answer) {
        document.getElementById("result").innerText = "Correct";
        score++;
    } else {
        document.getElementById("result").innerText = "Wrong";
    }

    document.getElementById("explanation").innerText = q.explanation;

    // Disable buttons after answer
    let buttons = document.querySelectorAll("#options button");
    buttons.forEach(btn => btn.disabled = true);
}

function nextQuestion() {
    current++;

    if (current < data.length) {
        document.getElementById("result").innerText = "";
        document.getElementById("explanation").innerText = "";
        loadQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    document.body.innerHTML = `
        <div class="container text-center mt-5">
            <div class="card p-5 shadow">
                <h2>Quiz Completed</h2>
                <h4 class="mt-3">Your Score: ${score}/${data.length}</h4>
                <a href="quiz.html" class="btn btn-primary mt-4">Restart Quiz</a>
            </div>
        </div>
    `;
}
</script>

</body>
</html>
