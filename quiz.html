<!DOCTYPE html>
<html>
<head>
    <title>MPSC Quiz</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f0f2f5;
        }
        .quiz-card {
            max-width: 700px;
            margin: auto;
            border-radius: 15px;
        }
        .option-btn {
            transition: 0.3s;
        }
        .option-btn:hover {
            background-color: #0d6efd;
            color: white;
        }
        .correct {
            background-color: #28a745 !important;
            color: white;
        }
        .wrong {
            background-color: #dc3545 !important;
            color: white;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="card quiz-card shadow p-4">

        <!-- Top Bar -->
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <button class="btn btn-sm btn-primary" onclick="setLang('en')">EN</button>
                <button class="btn btn-sm btn-success" onclick="setLang('mr')">मराठी</button>
            </div>
            <div>
                <b id="qNumber"></b> | <b id="score"></b>
            </div>
        </div>

        <!-- Progress -->
        <div class="progress mt-3">
            <div id="progressBar" class="progress-bar" style="width:0%"></div>
        </div>

        <!-- Question -->
        <h4 id="question" class="mt-4"></h4>

        <!-- Options -->
        <div id="options" class="mt-3"></div>

        <!-- Explanation -->
        <p id="explanation" class="mt-3 text-muted"></p>

        <!-- Next -->
        <button class="btn btn-dark mt-3" onclick="nextQuestion()">Next</button>

    </div>

</div>

<script>
let data = [];
let current = 0;
let score = 0;
let lang = 'en';

fetch('questions.json')
.then(res => res.json())
.then(q => {
    data = q;
    loadQuestion();
});

function setLang(l) {
    lang = l;
    loadQuestion();
}

function loadQuestion() {
    let q = data[current];

    document.getElementById("qNumber").innerText =
        (lang === 'en' ? "Q " : "प्रश्न ") + (current + 1) + "/" + data.length;

    document.getElementById("score").innerText =
        (lang === 'en' ? "Score: " : "गुण: ") + score;

    let percent = ((current) / data.length) * 100;
    document.getElementById("progressBar").style.width = percent + "%";

    let question = lang === 'en' ? q.question_en : q.question_mr;
    let options = lang === 'en' ? q.options_en : q.options_mr;

    document.getElementById("question").innerText = question;

    let optionsHtml = "";

    options.forEach(opt => {
        optionsHtml += `
            <button class="btn btn-outline-primary w-100 mt-2 option-btn"
                onclick="checkAnswer(this,'${opt}')">
                ${opt}
            </button>`;
    });

    document.getElementById("options").innerHTML = optionsHtml;
}

function checkAnswer(btn, selected) {
    let q = data[current];

    let correct = lang === 'en' ? q.answer_en : q.answer_mr;
    let explanation = lang === 'en' ? q.explanation_en : q.explanation_mr;

    let buttons = document.querySelectorAll("#options button");

    buttons.forEach(b => {
        if (b.innerText === correct) {
            b.classList.add("correct");
        }
        b.disabled = true;
    });

    if (selected === correct) {
        btn.classList.add("correct");
        score++;
    } else {
        btn.classList.add("wrong");
    }

    document.getElementById("explanation").innerText = explanation;
}

function nextQuestion() {
    current++;

    if (current < data.length) {
        document.getElementById("explanation").innerText = "";
        loadQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    document.body.innerHTML = `
        <div class="container text-center mt-5">
            <div class="card p-5 shadow">
                <h2>${lang === 'en' ? 'Quiz Completed' : 'क्विझ पूर्ण'}</h2>
                <h3>${lang === 'en' ? 'Score' : 'गुण'}: ${score}/${data.length}</h3>
                <a href="quiz.html" class="btn btn-primary mt-3">Restart</a>
            </div>
        </div>
    `;
}
</script>

</body>
</html>
